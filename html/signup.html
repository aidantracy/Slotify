<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slotify - Sign Up</title>
    <link rel="stylesheet" href="../css/auth.css">
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>
    <nav>
        <img src="../img/white-logo.png" alt="Slotify logo">
        <ul>
            <li><a href="../index.html" class="nav-button">Home</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Sign Up</h1>
            <form id="signup-form">
                <label>First name
                    <input type="text" id="first-name" required>
                </label>
                <label>Last name
                    <input type="text" id="last-name" required>
                </label>
                <label>Email
                    <input type="email" id="email" required>
                </label>
                <label>Password
                    <input type="password" id="password" minlength="6" required>
                </label>
                <button type="submit" class="auth-btn">Create Account</button>
                <p class="auth-error" id="error"></p>
            </form>
            <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const errorEl = document.getElementById('error');
            errorEl.textContent = '';
            try {
                const response = await fetch(`${window.SLOTIFY_CONFIG.API_BASE_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        first_name: document.getElementById('first-name').value.trim(),
                        last_name: document.getElementById('last-name').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Sign up failed.');
                Auth.setSession(data.token, data.user);
                window.location.href = 'eventPage.html';
            } catch (err) {
                errorEl.textContent = err.message;
            }
        });
    </script>
</body>
</html>
